name: Publish to GitHub Pages

# GitHub Pages serves this site from the gh-pages branch (created once,
# which auto-enabled Pages). This workflow keeps gh-pages in sync with
# main, so pushing to main is all it takes to deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main to gh-pages
        run: git push --force origin HEAD:gh-pages
